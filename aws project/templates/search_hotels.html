<!DOCTYPE html>
<html>
<head>
    <title>Search Hotels</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="hotels-bg">

<div class="header">
    <div class="logo">TravelGo</div>
    <a class="logout" href="home.html">Back</a>
</div>

<div class="search-container">
    <h2>Search Hotels 🏨</h2>

    <form onsubmit="searchHotels(event)">
        <input type="text" id="city" placeholder="Enter City" required>

        <select id="type">
            <option value="Luxury">Luxury</option>
            <option value="Budget">Budget</option>
            <option value="Family">Family</option>
        </select>

        <button type="submit">Search</button>
    </form>
</div>

<div id="results" class="results"></div>

<script>
function searchHotels(event) {
    event.preventDefault();

    let city = document.getElementById("city").value;
    let type = document.getElementById("type").value;

    let output = "";

    if (type === "Luxury") {
        output += `
        <div class="card">
            <h3>5⭐ Hotel in ${city}</h3>
            <p>Type: Luxury</p>
            <p>Price: ₹8000</p>
            <button onclick="bookHotel('Luxury Hotel', 8000)">Book Now</button>
        </div>`;
    }

    if (type === "Budget") {
        output += `
        <div class="card">
            <h3>Budget Stay in ${city}</h3>
            <p>Type: Budget</p>
            <p>Price: ₹2000</p>
            <button onclick="bookHotel('Budget Hotel', 2000)">Book Now</button>
        </div>`;
    }

    if (type === "Family") {
        output += `
        <div class="card">
            <h3>Family Resort in ${city}</h3>
            <p>Type: Family</p>
            <p>Price: ₹5000</p>
            <button onclick="bookHotel('Family Resort', 5000)">Book Now</button>
        </div>`;
    }

    document.getElementById("results").innerHTML = output;
}

function bookHotel(name, price) {
    let booking = {
        airline: name,
        price: price,
        date: new Date().toLocaleDateString()
    };

    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    bookings.push(booking);
    localStorage.setItem("bookings", JSON.stringify(bookings));

    alert("Hotel booked successfully ✅");
}
</script>

</body>
</html>
