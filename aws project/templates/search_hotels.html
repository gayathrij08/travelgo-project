<!DOCTYPE html>
<html>
<head>
    <title>Search Hotels</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card button {
            background: #0d47a1;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .card button:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">TravelGo</div>
    <a class="logout" href="/dashboard">Back</a>
</div>

<div class="search-container">
    <h2>Search Hotels 🏨</h2>

    <form method="POST" action="/hotels">
        <input type="text" name="city" placeholder="Enter City" required>
        <input type="date" name="checkin" required>
        <input type="date" name="checkout" required>

        <button type="submit">Search</button>
    </form>
</div>

<!-- ✅ CLEAN GRID -->
<div class="container">

{% if hotels %}
    {% for hotel in hotels %}
    <div class="card">
        <h3>{{ hotel.name }}</h3>
        <p><strong>City:</strong> {{ hotel.city }}</p>
        <p><strong>Price:</strong> ₹{{ hotel.price }}</p>

        <form method="POST" action="/book_hotel">
            <input type="hidden" name="name" value="{{ hotel.name }}">
            <input type="hidden" name="price" value="{{ hotel.price }}">

            <button type="submit">Book Now</button>
        </form>
    </div>
    {% endfor %}
{% endif %}

</div>

</body>
</html>
