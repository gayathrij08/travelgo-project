<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: black;
            color: white;
        }

        .back {
            color: #00c6ff;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        /* ✅ GRID LAYOUT */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        /* ✅ CARD STYLE */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card h3 {
            color: #0d47a1;
        }

        .card p {
            margin: 6px 0;
        }

        /* OPTIONAL: hover effect */
        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            color: white;
            margin-top: 50px;
        }

    </style>
</head>

<body>

<div class="header">
    <h3>TravelGo</h3>
    <a class="back" href="/dashboard">⬅ Back</a>
</div>

<h2>My Bookings ✈️</h2>

{% if bookings %}
<div class="container">

    {% for b in bookings %}
    <div class="card">
        <h3>{{ b.from }} → {{ b.to }}</h3>
        <p><b>Date:</b> {{ b.date }}</p>
        <p><b>Airline:</b> {{ b.airline }}</p>
        <p><b>Price:</b> ₹{{ b.price }}</p>
    </div>
    {% endfor %}

</div>
{% else %}
    <div class="empty">
        <h3>No bookings yet 😔</h3>
    </div>
{% endif %}

</body>
</html>
