<!DOCTYPE html>
<html>
<head>
    <title>Search Buses</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card button {
            background: #0d47a1;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .card button:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">TravelGo</div>
    <a class="logout" href="/dashboard">Back</a>
</div>

<div class="search-container">
    <h2>Search Buses 🚌</h2>

    <form method="POST" action="/buses">
        <input type="text" name="from" placeholder="From City" required>
        <input type="text" name="to" placeholder="To City" required>

        <button type="submit">Search</button>
    </form>
</div>

<!-- ✅ CLEAN GRID -->
<div class="container">

{% if buses %}
    {% for bus in buses %}
    <div class="card">
        <h3>{{ bus.from }} → {{ bus.to }}</h3>
        <p><strong>Bus:</strong> {{ bus.name }}</p>
        <p><strong>Price:</strong> ₹{{ bus.price }}</p>

        <form method="POST" action="/book_bus">
            <input type="hidden" name="name" value="{{ bus.name }}">
            <input type="hidden" name="price" value="{{ bus.price }}">

            <button type="submit">Book Now</button>
        </form>
    </div>
    {% endfor %}
{% endif %}

</div>

</body>
</html>
