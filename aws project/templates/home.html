<!DOCTYPE html>
<html>
<head>
    <title>TravelGo | Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0d47a1, #1976d2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 30px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #0d47a1;
        }

        .logout {
            text-decoration: none;
            background: #0d47a1;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
        }

        .logout:hover {
            background: #1565c0;
        }

        .welcome {
            text-align: center;
            margin-top: 40px;
            color: white;
        }

        .welcome h2 {
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 25px;
            width: 220px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #0d47a1;
        }

        .card p {
            color: #555;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="logo">TravelGo</div>
    <a class="logout" href="#" onclick="logout()">Logout</a>
</div>

<!-- Welcome -->
<div class="welcome">
    <h2 id="username">Welcome, User 👋</h2>
    <p>Plan your journey with ease</p>
</div>

<!-- Options -->
<div class="container">

    <a href="search_flights.html">
        <div class="card">
            <h3>✈️ Flights</h3>
            <p>Book flights easily</p>
        </div>
    </a>

    <a href="search_hotels.html">
        <div class="card">
            <h3>🏨 Hotels</h3>
            <p>Find best stays</p>
        </div>
    </a>

    <a href="my_bookings.html">
        <div class="card">
            <h3>📄 My Bookings</h3>
            <p>View your trips</p>
        </div>
    </a>
    <a href="search_bus.html">
    <div class="card">
        <h3>🚌 Buses</h3>
        <p>Book bus tickets</p>
    </div>
</a>

</div>

<script>
let user = localStorage.getItem("username");

if (user) {
    document.getElementById("username").innerText = "Welcome, " + user + " 👋";
} else {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("username");
    window.location.href = "login.html";
}
</script>

</body>
</html>
