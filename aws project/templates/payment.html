<!DOCTYPE html>
<html>
<head>
    <title>Payment | TravelGo</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #0d47a1, #1976d2);
            color: white;
            text-align: center;
        }

        .container {
            background: white;
            color: black;
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #0d47a1;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💳 Payment Page</h2>

    <p><strong>Airline:</strong> {{ booking.airline }}</p>
    <p><strong>From:</strong> {{ booking.from }}</p>
    <p><strong>To:</strong> {{ booking.to }}</p>
    <p><strong>Price:</strong> ₹{{ booking.price }}</p>

    <form action="/confirm_payment" method="POST">

        <!-- Hidden booking data -->
        <input type="hidden" name="airline" value="{{ booking.airline }}">
        <input type="hidden" name="from" value="{{ booking.from }}">
        <input type="hidden" name="to" value="{{ booking.to }}">
        <input type="hidden" name="date" value="{{ booking.date }}">
        <input type="hidden" name="price" value="{{ booking.price }}">

        <!-- Fake Payment Fields -->
        <input type="text" placeholder="Card Number" required>
        <input type="text" placeholder="Card Holder Name" required>
        <input type="text" placeholder="Expiry (MM/YY)" required>
        <input type="password" placeholder="CVV" required>

        <button type="submit">Pay Now</button>
    </form>
</div>

</body>
</html>
