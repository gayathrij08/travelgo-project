<!DOCTYPE html>
<html>
<head>
    <title>TravelGo | Forgot Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0d47a1, #1976d2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 8px;
            text-align: center;
        }

        h2 { color: #0d47a1; }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0d47a1;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover { background-color: #1565c0; }

        a {
            text-decoration: none;
            color: #0d47a1;
            font-size: 14px;
        }

        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>

    <form>
        <input type="email" placeholder="Enter Registered Email" required>
        <button type="submit">Reset Password</button>
    </form>

    <br>
    <a href="login.html">Back to Login</a>
</div>

</body>
</html>
