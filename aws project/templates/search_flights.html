<!DOCTYPE html>
<html>
<head>
    <title>Search Flights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card button {
            background: #0d47a1;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .card button:hover {
            background: #1565c0;
        }
    </style>
</head>

<body class="flights-bg">

<div class="header">
    <div class="logo">TravelGo</div>
    <a class="logout" href="/dashboard">Back</a>
</div>

<div class="search-container">
    <h2>Search Flights ✈️</h2>

    <form method="POST" action="/flights">
        <input type="text" name="from" placeholder="From City" required>
        <input type="text" name="to" placeholder="To City" required>
        <input type="date" name="date" required>

        <button type="submit">Search</button>
    </form>
</div>

<!-- ✅ CLEAN RESULTS -->
<div class="container">

{% if flights %}
    {% for flight in flights %}
    <div class="card">
        <h3>{{ flight.from }} → {{ flight.to }}</h3>
        <p>Date: {{ flight.date }}</p>
        <p>Airline: {{ flight.airline }}</p>
        <p>Time: {{ flight.time }}</p>
        <p>Price: ₹{{ flight.price }}</p>

        <form method="POST" action="/book">
            <input type="hidden" name="airline" value="{{ flight.airline }}">
            <input type="hidden" name="price" value="{{ flight.price }}">
            <input type="hidden" name="from" value="{{ flight.from }}">
            <input type="hidden" name="to" value="{{ flight.to }}">
            <input type="hidden" name="date" value="{{ flight.date }}">

            <button type="submit">Book Now</button>
        </form>
    </div>
    {% endfor %}
{% endif %}

</div>

</body>
</html>
